# autopa - example configuration
#
# Requires a load cell, either a standalone [load_cell] or (as on this
# machine) a [load_cell_probe]. The load cell must be calibrated
# (LOAD_CELL_CALIBRATE) so it streams force, though autopa analysis uses raw
# ADC counts and treats grams as approximate.
#
# Install: run ./install.sh (symlinks autopa/ into ~/klipper/klippy/extras/autopa),
# add this section to printer.cfg, then restart Klipper.
[autopa]
# Where per-(material, temperature) PA profiles are persisted.
#profile_path: ~/printer_data/autopa/profiles.json
# Where raw captures (.npz) are saved for offline analysis/replay.
#capture_dir: ~/printer_data/autopa/captures
#save_captures: True
# Hotend/nozzle description recorded in every saved capture's metadata (free
# text; hardware rarely changes, so set it once here). AUTOPA_ANNOTATE
# HOTEND=... still overrides it per-capture.
#hotend: Volcano, brass heatblock, CHC steel nozzle

# ---------------------------------------------------------------------------
# Using it in a print. Four workflows, all from the slicer's MATERIAL + TEMP:
#
#   * Recall a stored profile (errors if none exists):
#       AUTOPA_APPLY MATERIAL=PLA TEMP=220        ; add BRAND=... to narrow it
#
#   * Calibrate ONLY when no profile exists, else recall -- ELSE names YOUR
#     macro, run with MATERIAL/TEMP/BRAND forwarded only on a miss. Movement,
#     method, and nozzle cleaning are entirely up to you:
#       AUTOPA_APPLY MATERIAL=PLA TEMP=220 ELSE=AUTOPA_CALIBRATE
#
#       [gcode_macro AUTOPA_CALIBRATE]
#       gcode:
#         G1 X.. Y.. F6000                              ; move to a bin / safe spot
#         AUTOPA_SWEEP                                  ; or AUTOPA_DECAY (your method)
#         ; ... your nozzle wipe / purge here ...
#         AUTOPA_SET MATERIAL={params.MATERIAL} TEMP={params.TEMP} PA={printer.extruder.pressure_advance}
#
#   * Calibrate every print (no profiles): put AUTOPA_DECAY (or AUTOPA_SWEEP)
#     in your pre-print routine after the nozzle is hot and parked -- it
#     measures, applies the PA live, and prints a paste-able line.
#
#   * No automation: run AUTOPA_DECAY/AUTOPA_SWEEP once and paste the printed
#     SET_PRESSURE_ADVANCE line into your slicer's filament start g-code.
